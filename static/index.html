<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MCPAgent Mini E-Commerce application</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f4f4f4; color: #333; }
    header { background: #2c3e50; color: white; padding: 1rem 2rem; }
    nav { display: flex; gap: 1rem; margin-top: 0.5rem; }
    nav button { background: transparent; border: 1px solid white; color: white; padding: 0.3rem 0.8rem; cursor: pointer; border-radius: 4px; }
    nav button.active { background: white; color: #2c3e50; }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    section { display: none; }
    section.active { display: block; }
    h2 { margin-bottom: 1rem; }
    form { background: white; padding: 1rem; border-radius: 6px; margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    form input { flex: 1; min-width: 150px; padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; }
    form button { padding: 0.4rem 1rem; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 6px; overflow: hidden; }
    th, td { padding: 0.6rem 1rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #ecf0f1; }
    .btn-del { background: #e74c3c; color: white; border: none; padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; }
    #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #2ecc71; color: white; padding: 0.7rem 1.2rem; border-radius: 6px; display: none; }
  </style>
</head>
<body>
<header>
  <h1>Mini E-Commerce</h1>
  <nav>
    <button class="active" onclick="showTab('users', this)" id="tab-users">Users</button>
    <button onclick="showTab('products', this)" id="tab-products">Products</button>
    <button onclick="showTab('orders', this)" id="tab-orders">Orders</button>
  </nav>
</header>
<main>

  <!-- USERS -->
  <section id="users" class="active">
    <h2>Users</h2>
    <form id="user-form">
      <input id="user-name" placeholder="Name" required />
      <input id="user-email" type="email" placeholder="Email" required />
      <button type="submit">Add User</button>
    </form>
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Email</th><th></th></tr></thead>
      <tbody id="users-table"></tbody>
    </table>
  </section>

  <!-- PRODUCTS -->
  <section id="products">
    <h2>Products</h2>
    <form id="product-form">
      <input id="product-name" placeholder="Name" required />
      <input id="product-desc" placeholder="Description" />
      <input id="product-price" type="number" step="0.01" placeholder="Price" required />
      <input id="product-stock" type="number" placeholder="Stock" required />
      <button type="submit">Add Product</button>
    </form>
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Description</th><th>Price</th><th>Stock</th><th></th></tr></thead>
      <tbody id="products-table"></tbody>
    </table>
  </section>

  <!-- ORDERS -->
  <section id="orders">
    <h2>Orders</h2>
    <form id="order-form">
      <input id="order-user-id" type="number" placeholder="User ID" required />
      <input id="order-product-id" type="number" placeholder="Product ID" required />
      <input id="order-quantity" type="number" placeholder="Quantity" required />
      <button type="submit">Place Order</button>
    </form>
    <table>
      <thead><tr><th>ID</th><th>User ID</th><th>Created At</th><th>Items</th><th></th></tr></thead>
      <tbody id="orders-table"></tbody>
    </table>
  </section>

</main>
<div id="toast"></div>

<script>
  const API = "";

  function showTab(name, btn) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    document.getElementById(name).classList.add("active");
    btn.classList.add("active");
    if (name === "users") loadUsers();
    if (name === "products") loadProducts();
    if (name === "orders") loadOrders();
  }

  function toast(msg, color = "#2ecc71") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.background = color;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2500);
  }

  // USERS
  async function loadUsers() {
    const res = await fetch(`${API}/users/`);
    const users = await res.json();
    document.getElementById("users-table").innerHTML = users.map(u =>
      `<tr id="user-row-${u.id}">
        <td>${u.id}</td><td>${u.name}</td><td>${u.email}</td>
        <td><button class="btn-del" onclick="deleteUser(${u.id})">Delete</button></td>
      </tr>`
    ).join("");
  }

  document.getElementById("user-form").addEventListener("submit", async e => {
    e.preventDefault();
    const res = await fetch(`${API}/users/`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: document.getElementById("user-name").value, email: document.getElementById("user-email").value })
    });
    if (res.ok) { toast("User created"); e.target.reset(); loadUsers(); }
    else { const err = await res.json(); toast(err.detail, "#e74c3c"); }
  });

  async function deleteUser(id) {
    await fetch(`${API}/users/${id}`, { method: "DELETE" });
    toast("User deleted", "#e67e22"); loadUsers();
  }

  // PRODUCTS
  async function loadProducts() {
    const res = await fetch(`${API}/products/`);
    const products = await res.json();
    document.getElementById("products-table").innerHTML = products.map(p =>
      `<tr id="product-row-${p.id}">
        <td>${p.id}</td><td>${p.name}</td><td>${p.description || ""}</td><td>$${p.price}</td><td>${p.stock}</td>
        <td><button class="btn-del" onclick="deleteProduct(${p.id})">Delete</button></td>
      </tr>`
    ).join("");
  }

  document.getElementById("product-form").addEventListener("submit", async e => {
    e.preventDefault();
    const res = await fetch(`${API}/products/`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: document.getElementById("product-name").value,
        description: document.getElementById("product-desc").value,
        price: parseFloat(document.getElementById("product-price").value),
        stock: parseInt(document.getElementById("product-stock").value)
      })
    });
    if (res.ok) { toast("Product created"); e.target.reset(); loadProducts(); }
    else { const err = await res.json(); toast(err.detail, "#e74c3c"); }
  });

  async function deleteProduct(id) {
    await fetch(`${API}/products/${id}`, { method: "DELETE" });
    toast("Product deleted", "#e67e22"); loadProducts();
  }

  // ORDERS
  async function loadOrders() {
    const res = await fetch(`${API}/orders/`);
    const orders = await res.json();
    document.getElementById("orders-table").innerHTML = orders.map(o =>
      `<tr id="order-row-${o.id}">
        <td>${o.id}</td><td>${o.user_id}</td><td>${new Date(o.created_at).toLocaleString()}</td>
        <td>${o.items.map(i => `P${i.product_id} x${i.quantity}`).join(", ")}</td>
        <td><button class="btn-del" onclick="deleteOrder(${o.id})">Delete</button></td>
      </tr>`
    ).join("");
  }

  document.getElementById("order-form").addEventListener("submit", async e => {
    e.preventDefault();
    const res = await fetch(`${API}/orders/`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        user_id: parseInt(document.getElementById("order-user-id").value),
        items: [{ product_id: parseInt(document.getElementById("order-product-id").value), quantity: parseInt(document.getElementById("order-quantity").value) }]
      })
    });
    if (res.ok) { toast("Order placed"); e.target.reset(); loadOrders(); }
    else { const err = await res.json(); toast(err.detail, "#e74c3c"); }
  });

  async function deleteOrder(id) {
    await fetch(`${API}/orders/${id}`, { method: "DELETE" });
    toast("Order deleted", "#e67e22"); loadOrders();
  }

  // init
  loadUsers();
</script>
</body>
</html>
